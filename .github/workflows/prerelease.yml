name: Prerelease

on:
  push:
    tags:
      - "v*rc*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing prerelease tag to publish, for example v0.2.0rc1"
        required: true
        type: string

concurrency:
  group: prerelease-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-preview:
    name: Verify preview branch prerelease
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}

    steps:
      - name: Resolve prerelease tag
        id: resolve-tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch prerelease tag
        shell: bash
        run: |
          git fetch origin "refs/tags/${{ steps.resolve-tag.outputs.tag }}:refs/tags/${{ steps.resolve-tag.outputs.tag }}" --force

      - name: Check out tagged source for validation
        run: git checkout "${{ steps.resolve-tag.outputs.tag }}"

      - name: Verify tag points to a commit on preview
        shell: bash
        run: |
          if [[ ! "${{ steps.resolve-tag.outputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+$ ]]; then
            echo "Preview releases require tags like v1.2.3rc1."
            exit 1
          fi

          git fetch origin preview --depth=1
          target_sha="$(git rev-list -n 1 "${{ steps.resolve-tag.outputs.tag }}")"
          if [[ -z "${target_sha}" ]]; then
            echo "Tag ${{ steps.resolve-tag.outputs.tag }} does not exist."
            exit 1
          fi

          if ! git merge-base --is-ancestor "${target_sha}" "origin/preview"; then
            echo "Prerelease tag must point to a commit reachable from origin/preview."
            exit 1
          fi

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as fh:
              data = tomllib.load(fh)
          print(data["project"]["version"])
          PY
          )"
          expected_tag="v${package_version}"
          actual_tag="${{ steps.resolve-tag.outputs.tag }}"

          if [[ "${expected_tag}" != "${actual_tag}" ]]; then
            echo "Tag/version mismatch: pyproject.toml declares ${package_version}, but workflow was run for ${actual_tag}."
            exit 1
          fi

  build:
    name: Build prerelease packages
    runs-on: ubuntu-latest
    needs:
      - verify-preview

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-preview.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload prerelease artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prerelease-dist
          path: dist/*

  github-prerelease:
    name: Publish GitHub prerelease
    runs-on: ubuntu-latest
    needs:
      - verify-preview
      - build
    permissions:
      contents: write

    steps:
      - name: Download prerelease artifacts
        uses: actions/download-artifact@v4
        with:
          name: prerelease-dist
          path: dist

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-preview.outputs.tag }}
          files: dist/*
          generate_release_notes: true
          prerelease: true
